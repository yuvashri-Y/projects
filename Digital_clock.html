<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Clock</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1b18a7, violet, pink);
      font-family: 'Orbitron', sans-serif;
    }

    .clock-container {
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 30px 60px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      text-align: center;
      color: #fff;
      animation: fadeIn 1.5s ease-in-out;
    }
    
    h1 {
      font-size: 1.6rem;
      margin-bottom: 20px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #f7f7f7;
    }

    .time {
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.7), 0 0 40px rgba(255, 255, 255, 0.5);
      transition: all 0.3s ease-in-out;
    }

    .time span {
      display: inline-block;
      min-width: 60px;
    }

    @keyframes fadeIn {
      from { 
        opacity: 0; transform: translateY(-30px); 
      }
      to { 
        opacity: 1; transform: translateY(0); 
      }
    }
    @media (max-width: 600px) {
      .clock-container {
        padding: 20px 40px;
      }
      .time {
        font-size: 2.2rem;
        letter-spacing: 2px;
      }
      h1 {
        font-size: 1.2rem;
      } 
    } 
  </style>
</head>
<body>
  <div class="clock-container">
    <h1>India Time Zone</h1>
    <div class="time">
      <span id="hr">00</span> :
      <span id="min">00</span> :
      <span id="sec">00</span>
      <span id="ampm">AM</span>
    </div>
  </div>

  <script>
    function updateClock() {
      let date = new Date();
      let hr = date.getHours();
      let min = date.getMinutes();
      let sec = date.getSeconds();
      let ampm = hr >= 12 ? "PM" : "AM";

      hr = hr % 12;
      hr = hr ? hr : 12; 

      document.getElementById("hr").textContent = padZero(hr);
      document.getElementById("min").textContent = padZero(min);
      document.getElementById("sec").textContent = padZero(sec);
      document.getElementById("ampm").textContent = ampm;
    }

    function padZero(num) {
      return num < 10 ? "0" + num : num;
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>
</html>
