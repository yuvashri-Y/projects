<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D text card flip</title>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap">
    <style>
        *{
            margin: 0%;
            padding: 0%;
            font-family: 'Poppins',sans-serif;
        }
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
         .container{
            position: relative;
            /* width: 200px;
            height: 250px; */
            width: 400px;
            height: 450px;
            perspective: 501px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.8s ease;
            transform-style: preserve-3d;
            /* transform: rotateY(-80deg); */
        } 
        .front,.back{
            width: 100%;
            height: 20%;
            position: absolute;
            transform: scale(1.4);
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            color:white;
        }
        
        .back{
            height: 30%;
            width: 80%;
            position: absolute;
            transform: translateZ(-300px) scale(2);
        }
        .back h3,.back p,.icons{
            transform: scaleX(-1);
        }
        hr{
            width: 50%;
        }
        .card{
            width: 100%;
            height: 100%;
            transition: 0.8s ease;
            transform:  translateZ(-150px) scale(1.3);
        }
        .card-inner{
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s;
        }
        .card-back,.card-front{
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            position: absolute;
            border-radius: 10px;
        }
        .card-front{
            /* background-color: lightblue; */
            background-image: url("D:/card_profile_2.jpg");
            width: 100%;
            height: 100%;
            background-repeat: no-repeat;
            background-size: cover;
        }
        .card-back{
            background-color: navy;
            transform: rotateY(-180deg);
        }
        .container:hover .card-inner {
      transform: rotateY(180deg);
            /* animation: rotate 3s linear; */
        }
        .container:hover {
            /* animation: rotate 3s linear ; */
            transform: rotateY(180deg);
        }
        .icons{
            width: 80%;
            display: flex;
            justify-content: space-around;
        }
        .icons div{
            border-radius: 50%;
            width: 30px;
            height: 30px;
            background-color: white;
            color: navy;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        @keyframes rotate {
            from{
                transform-origin: left;
                transform: rotateY(0);
                
            }
            to{
                transform-origin: left;
                transform: rotateY(180deg);
            }
            /* 0%{
                transform: rotate3d(0,0,0);
            }
            50%{
                transform: rotate3d(0,-90deg,0);
            }
            100%{
                transform: rotate3d(0,-180deg,0);
            } */
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="front">
            <h3>Henry Ray</h3>
            <hr>
            <p>Rome , Italy</p>
        </div>
        <div class="card">
            <div class="card-inner">
                <div class="card-front">
                </div>
                <div class="card-back">
                </div>
            </div>
        </div>
        <div class="back">
            <h3>Web Developer</h3>
            <p>Follow Me</p>
            <div class="icons">
                <div><i class="fa-brands fa-facebook-f"></i></div>
                <div><i class="fa-brands fa-instagram"></i></div>
                <div><i class="fa-brands fa-twitter"></i></div>
                <div><i class="fa-brands fa-youtube"></i></div>
            </div>
        </div>
    </div>
</body>
</html>
