<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
    <title>social link profile</title>
    <style>
        body{
            background-color: black;
            margin: 0px;
            display: flex;
            overflow:hidden;
        }
        .container{
            position:relative;
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            background-color: #212121;
            top:20px;
            left:40vw;
            height:650px; 
            padding:30px;
            border-radius: 10px;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 500;
            color: white;
            justify-content: space-between;
        }
        .container div{
            display: flex;
            align-items: center;
            justify-content: center;
            width:300px;
            height:30px;
            background-color: #424242;
            padding:10px;
            margin:5px;
            text-align: center;
            border-radius: 10px;
            
        }
        .container div:hover{
            background-color: greenyellow;
            color: black;
        } 
        h3 {
            color: greenyellow;
            margin: 0%;
        }
        img {
            border-radius: 50px;
        }
        a {
            text-decoration: none;
            color: white;
        }
        h1 {
            margin: 0%;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/avatar-jessica.jpeg" height="80px" width="80px">
        <h1>Jessica Randall</h1>
        <h3>London,United Kingdom</h3>
        <p>"Front-end developer and avid reader."</p>
        <div class="github"><a href="https://github.com/yuvashri-Y">GitHub</a></div>
        <div class="fm"><a href="https://github.com/yuvashri-Y">Frontend Mentor</a></div>
        <div class="linkedin"><a href="https://www.linkedin.com/in/yuvashri-y/">LinkedIn</a></div>
        <div class="leetcode"><a href="https://leetcode.com/21EER109_YUVASHRI/">Leetcode</a></div>
        <div class="insta"><a href="https://www.instagram.com/yuvashri814?igsh=ZWpvOWx1Nms5c25o">Instagram</a></div>
    </div>
</body>
</html>
