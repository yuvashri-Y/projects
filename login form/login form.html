<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login form</title>
    <style>
        *{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body{
            background-color:rgb(172, 215, 241);
        }
        label{
            font-weight: 500;
        }
        legend{
            text-align: center;
        }
        form{
            background-color: lightgray;
            width:60%;
            border: 5px solid black;
            padding: 10px;
            position: relative;
            left: 20%;
            top:50px;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">Login here using your details</h1>
    <form action="/action.html"> 
        <fieldset>
            <legend>Form</legend>
    <label>Name:</label>
    <input type="text" placeholder="Enter your name" required>
    <br>
    <label>Mobile number:</label><input type="number" placeholder="Enter your mobile number">
    <br>
    <label>Date-of-birth</label>
    <input type="date" placeholder="Enter your DOB">
    <br>
    <label>Email-id:</label>
    <input type="email" placeholder="Enter your Email-id" required>
    
    <br><label>Password:</label>
    <input type="password" placeholder="Enter your Password" required>
    
    <br><label>Gender:</label>
    <input type="radio" name="gen">Male
    <input type="radio" name="gen">Female
    <input type="radio" name="gen">Others
    <br>
    <label>Attach your resume:</label>
    <input type="file">
    <br>
    <label>Highest qualification:</label>
    <input list="opt">
    <datalist id="opt">
        <option value="PG"></option>
        <option value="UG"></option>
        <option value="Diplomo"></option>
        <option value="12th"></option>
        <option value="10th"></option>
    </datalist>
    <br>
    <label>Degree:</label>
    <select>
        <option value="1">M.E</option>
        <option value="2">M.Tech</option>
        <option value="2">B.E</option>
        <option value="2">B.Tech</option>
        <option value="2">MSc</option>
        <option value="2">BSc</option>
    </select>
    <br>
    <label>Linked-in profile link:</label>
    <input type="url">
    <br>
    <label>3 Skills with range:</label>
    <br>
    <input type="text"><input type="range" min="1" max="3">
    <br>
    <input type="text"><input type="range" min="1" max="3">
    <br>
    <input type="text"><input type="range" min="1" max="3">
    <br>
    <input type="checkbox">Accept the terms & conditions
    <br>
    <input type="submit"><input type="reset">
        </fieldset>
    </form>
</body>
</html>
